<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DoxPro Exam Portal - Registration</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --yellow: #FCC206;
            --black: #1A1A1A;
            --white: #FFFFFF;
        }
        body { 
            background: radial-gradient(ellipse at 50% 0%, #2a2a3e 0%, #1a1a1a 50%, #0a0a0a 100%);
            color: var(--white);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            width: 100%;
            max-width: 500px;
            padding: 20px;
        }
        .card { 
            background: rgba(252, 194, 6, 0.05);
            border: 1px solid rgba(252, 194, 6, 0.2);
            backdrop-filter: blur(10px);
            border-radius: 12px; 
            padding: 2rem;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .title {
            text-align: center;
            font-weight: 700;
            margin-bottom: 1.5rem;
            color: var(--yellow);
            text-shadow: 0 0 10px rgba(252, 194, 6, 0.3);
        }
        .form-label {
            display: block;
            margin-bottom: 0.5rem;
            font-size: 0.9rem;
            color: #d0d0d0;
            font-weight: 500;
        }
        .form-control, .form-select {
            width: 100%;
            padding: 0.8rem;
            margin-bottom: 1.5rem;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            color: var(--white);
            font-family: inherit;
            box-sizing: border-box;
            transition: all 0.3s;
        }
        .form-control:focus, .form-select:focus {
            outline: none;
            border-color: var(--yellow);
            background: rgba(252, 194, 6, 0.05);
            box-shadow: 0 0 10px rgba(252, 194, 6, 0.2);
        }
        .form-select option {
            background: var(--black);
            color: var(--white);
        }
        .radio-group {
            display: flex;
            gap: 1.5rem;
            margin-bottom: 2rem;
        }
        .radio-label {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            cursor: pointer;
        }
        .btn-primary {
            width: 100%;
            padding: 1rem;
            border: none;
            border-radius: 50px;
            background: linear-gradient(135deg, #fcc206 0%, #ffdd44 100%);
            color: var(--black);
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.4s;
            box-shadow: 0 5px 15px rgba(252, 194, 6, 0.3);
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(252, 194, 6, 0.5);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <h2 class="title">DoxPro Exam Portal</h2>
            <form action="/" method="POST">
                <div>
                    <label for="firstName" class="form-label">First Name</label>
                    <input type="text" class="form-control" id="firstName" name="first_name" required>
                </div>
                <div>
                    <label for="surname" class="form-label">Surname</label>
                    <input type="text" class="form-control" id="surname" name="surname" required>
                </div>
                <div>
                    <label for="branch" class="form-label">Branch</label>
                    <select class="form-select" id="branch" name="branch" required>
                        <option value="ENTC">ENTC</option>
                        <option value="EXTC">EXTC</option>
                        <option value="EE">EE</option>
                    </select>
                </div>
                <div>
                    <label class="form-label">Batch</label>
                    <div class="radio-group">
                        <label class="radio-label">
                            <input type="radio" name="batch" value="Morning" required>
                            Morning
                        </label>
                        <label class="radio-label">
                            <input type="radio" name="batch" value="Evening" required>
                            Evening
                        </label>
                    </div>
                </div>
                <button class="btn-primary" type="submit">Start Exam</button>
            </form>
        </div>
    </div>
</body>
</html>
