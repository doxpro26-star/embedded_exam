<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DoxPro Exam Portal - Registration</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --yellow: #FCC206;
            --black: #1A1A1A;
            --gray-dark: #2E343B;
            --white: #FFFFFF;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background: var(--black);
            color: var(--white);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* Animated Tech Background */
        .bg-animation {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(ellipse at 50% 0%, #2a2a3e 0%, #1a1a1a 50%, #0a0a0a 100%);
            z-index: 0;
        }
        .bg-animation::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: 
                radial-gradient(circle at 20% 50%, rgba(252, 194, 6, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 80% 50%, rgba(138, 92, 246, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 50% 80%, rgba(252, 194, 6, 0.08) 0%, transparent 50%);
            animation: gradientShift 15s ease infinite;
        }
        .bg-animation::after {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background-image: 
                linear-gradient(rgba(252, 194, 6, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(252, 194, 6, 0.03) 1px, transparent 1px);
            background-size: 50px 50px;
            opacity: 0.5;
        }

        @keyframes gradientShift {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.1); opacity: 0.8; }
        }

        /* Glassmorphic Container */
        .container {
            position: relative;
            z-index: 2;
            width: 100%;
            max-width: 500px;
            padding: 20px;
            animation: fadeInUp 0.8s ease-out forwards;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .card { 
            background: rgba(26, 26, 26, 0.6);
            border: 1px solid rgba(252, 194, 6, 0.2);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 16px; 
            padding: 2.5rem;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5), inset 0 0 20px rgba(252, 194, 6, 0.05);
            transition: all 0.3s ease;
        }
        .card:hover {
            border-color: rgba(252, 194, 6, 0.4);
            box-shadow: 0 20px 40px rgba(0,0,0,0.6), inset 0 0 30px rgba(252, 194, 6, 0.1);
        }

        /* Title */
        .title {
            text-align: center;
            font-weight: 800;
            font-size: 2rem;
            margin-bottom: 2rem;
            background: linear-gradient(135deg, #fcc206 0%, #ffdd44 50%, #fcc206 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shimmer 3s linear infinite;
            background-size: 200% auto;
            letter-spacing: -0.5px;
        }

        @keyframes shimmer {
            to { background-position: 200% center; }
        }

        /* Inputs */
        .form-label {
            display: block;
            margin-bottom: 0.5rem;
            font-size: 0.85rem;
            color: rgba(255, 255, 255, 0.7);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .form-control, .form-select {
            width: 100%;
            padding: 1rem;
            margin-bottom: 1.5rem;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            color: var(--white);
            font-family: inherit;
            font-size: 1rem;
            box-sizing: border-box;
            transition: all 0.3s;
        }
        .form-control:focus, .form-select:focus {
            outline: none;
            border-color: var(--yellow);
            background: rgba(252, 194, 6, 0.05);
            box-shadow: 0 0 15px rgba(252, 194, 6, 0.2);
            transform: translateY(-2px);
        }
        .form-select option {
            background: var(--gray-dark);
            color: var(--white);
        }

        /* Radio Buttons */
        .radio-group {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
        }
        .radio-label {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            cursor: pointer;
            padding: 1rem;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            transition: all 0.3s;
            font-weight: 500;
        }
        .radio-label:hover {
            background: rgba(252, 194, 6, 0.05);
            border-color: rgba(252, 194, 6, 0.3);
        }
        .radio-label input:checked + span {
            color: var(--yellow);
            font-weight: 700;
        }
        .radio-label input {
            accent-color: var(--yellow);
            width: 1.2rem;
            height: 1.2rem;
        }

        /* Glowing Button */
        .btn-primary {
            width: 100%;
            padding: 1.2rem;
            border: none;
            border-radius: 50px;
            background: linear-gradient(135deg, #fcc206 0%, #ffdd44 100%);
            color: var(--black);
            font-weight: 800;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 10px 30px rgba(252, 194, 6, 0.4), 0 0 0 0 rgba(252, 194, 6, 0.5);
            animation: pulse-shadow 2s infinite;
            position: relative;
            overflow: visible;
            letter-spacing: 0.5px;
        }

        @keyframes pulse-shadow {
            0%, 100% { box-shadow: 0 10px 30px rgba(252, 194, 6, 0.4), 0 0 0 0 rgba(252, 194, 6, 0); }
            50% { box-shadow: 0 10px 30px rgba(252, 194, 6, 0.4), 0 0 0 10px rgba(252, 194, 6, 0); }
        }

        .btn-primary:hover {
            transform: translateY(-4px) scale(1.02);
            box-shadow: 0 15px 40px rgba(252, 194, 6, 0.6);
        }
    </style>
</head>
<body>
    <div class="bg-animation"></div>
    <div class="container">
        <div class="card">
            <h2 class="title">DoxPro Portal</h2>
            <form action="/" method="POST">
                <div>
                    <label for="firstName" class="form-label">First Name</label>
                    <input type="text" class="form-control" id="firstName" name="first_name" required autocomplete="off">
                </div>
                <div>
                    <label for="surname" class="form-label">Surname</label>
                    <input type="text" class="form-control" id="surname" name="surname" required autocomplete="off">
                </div>
                <div>
                    <label for="branch" class="form-label">Branch</label>
                    <select class="form-select" id="branch" name="branch" required>
                        <option value="ENTC">ENTC</option>
                        <option value="EXTC">EXTC</option>
                        <option value="EE">EE</option>
                    </select>
                </div>
                <div>
                    <label class="form-label">Batch</label>
                    <div class="radio-group">
                        <label class="radio-label">
                            <input type="radio" name="batch" value="Morning" required>
                            <span>Morning</span>
                        </label>
                        <label class="radio-label">
                            <input type="radio" name="batch" value="Evening" required>
                            <span>Evening</span>
                        </label>
                    </div>
                </div>
                <button class="btn-primary" type="submit">INITIALIZE EXAM</button>
            </form>
        </div>
    </div>
</body>
</html>
