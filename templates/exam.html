<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DoxPro Exam Portal - {{ student_name }}</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --yellow: #FCC206;
            --black: #1A1A1A;
            --white: #FFFFFF;
        }
        body { 
            background: radial-gradient(ellipse at 50% 0%, #2a2a3e 0%, #1a1a1a 50%, #0a0a0a 100%);
            color: var(--white);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            margin: 0;
            padding: 2rem 1rem;
        }
        .container {
            width: 100%;
            max-width: 800px;
            margin: 0 auto;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid rgba(252, 194, 6, 0.2);
        }
        .header h2 {
            margin: 0;
            color: var(--yellow);
            font-weight: 700;
        }
        .badge {
            background: rgba(252, 194, 6, 0.1);
            border: 1px solid rgba(252, 194, 6, 0.3);
            color: var(--yellow);
            padding: 0.5rem 1rem;
            border-radius: 50px;
            font-size: 0.9rem;
            font-weight: 600;
        }
        .alert {
            display: none;
            background: rgba(220, 53, 69, 0.1);
            border: 1px solid rgba(220, 53, 69, 0.5);
            color: #ff6b6b;
            padding: 1rem;
            border-radius: 8px;
            margin-bottom: 2rem;
        }
        .question-card { 
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 12px; 
            padding: 2rem;
            margin-bottom: 1.5rem;
            transition: all 0.3s;
        }
        .question-card:hover {
            border-color: rgba(252, 194, 6, 0.3);
            box-shadow: 0 5px 20px rgba(0,0,0,0.3);
        }
        .question-card h5 {
            margin-top: 0;
            margin-bottom: 1.5rem;
            font-size: 1.1rem;
            line-height: 1.5;
        }
        .radio-label {
            display: flex;
            align-items: center;
            gap: 0.8rem;
            cursor: pointer;
            padding: 0.8rem;
            border-radius: 8px;
            background: rgba(0,0,0,0.2);
            margin-bottom: 0.5rem;
            transition: all 0.2s;
        }
        .radio-label:hover {
            background: rgba(252, 194, 6, 0.05);
        }
        .radio-label input[type="radio"] {
            accent-color: var(--yellow);
        }
        .btn-success {
            width: 100%;
            padding: 1.2rem;
            border: none;
            border-radius: 50px;
            background: linear-gradient(135deg, #fcc206 0%, #ffdd44 100%);
            color: var(--black);
            font-weight: 700;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.4s;
            box-shadow: 0 5px 15px rgba(252, 194, 6, 0.3);
            margin-bottom: 3rem;
        }
        .btn-success:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(252, 194, 6, 0.5);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h2>DoxPro Exam Portal</h2>
            <span class="badge">Student: {{ student_name }}</span>
        </div>

        <div id="warning-alert" class="alert">
            <strong>Warning!</strong> You have switched tabs. Your exam will be automatically submitted if you do this more than 2 times.
            <span id="warning-count-display"></span>
        </div>

        <form id="examForm" action="/submit" method="POST">
            {% for q in questions %}
            <div class="question-card">
                <h5>{{ loop.index }}. {{ q.question }}</h5>
                {% for opt in q.options %}
                <label class="radio-label">
                    <input type="radio" name="question_{{ q.id }}" value="{{ opt }}" required>
                    {{ opt }}
                </label>
                {% endfor %}
            </div>
            {% endfor %}
            
            <button id="submitBtn" class="btn-success" type="submit">Submit Exam</button>
        </form>
    </div>

    <script>
        let warnings = 0;
        const maxWarnings = 2; // More than 2 times = auto submit on the 3rd time.
        let isSubmitting = false;

        document.getElementById('examForm').addEventListener('submit', function() {
            isSubmitting = true;
        });

        document.addEventListener("visibilitychange", function() {
            if (document.hidden && !isSubmitting) {
                warnings++;
                
                // Record warning to backend
                fetch('/record_warning', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    }
                });

                if (warnings > maxWarnings) {
                    isSubmitting = true; // Prevent further warnings during submission
                    alert("You have switched tabs more than 2 times. The exam will now be automatically submitted.");
                    document.getElementById('examForm').submit();
                } else {
                    document.getElementById('warning-alert').style.display = 'block';
                    document.getElementById('warning-count-display').innerText = `(Warning ${warnings} of ${maxWarnings})`;
                    alert(`Warning! You have switched tabs. If you do this ${maxWarnings - warnings + 1} more time(s), your exam will be automatically submitted.`);
                }
            }
        });
    </script>
</body>
</html>
