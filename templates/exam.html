<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DoxPro Exam - {{ student_name }}</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --yellow: #FCC206;
            --black: #1A1A1A;
            --white: #FFFFFF;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }

        body {
            background: var(--black);
            color: var(--white);
            min-height: 100vh;
            position: relative;
        }

        /* Animated Tech Background */
        .bg-animation {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: radial-gradient(ellipse at 50% 0%, #2a2a3e 0%, #1a1a1a 50%, #0a0a0a 100%);
            z-index: -1;
        }
        .bg-animation::before {
            content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            background: 
                radial-gradient(circle at 20% 50%, rgba(252, 194, 6, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 80% 50%, rgba(138, 92, 246, 0.05) 0%, transparent 50%);
            animation: gradientShift 20s ease infinite;
        }
        .bg-animation::after {
            content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            background-image: 
                linear-gradient(rgba(252, 194, 6, 0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(252, 194, 6, 0.02) 1px, transparent 1px);
            background-size: 50px 50px;
        }
        @keyframes gradientShift { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.1); } }

        /* Container & Header */
        .container {
            width: 100%;
            max-width: 800px;
            margin: 0 auto;
            padding: 6rem 1rem 4rem; /* Top padding for fixed header */
        }

        .header {
            position: fixed;
            top: 0; left: 0; right: 0;
            height: 80px;
            background: rgba(26, 26, 26, 0.85);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-bottom: 2px solid var(--yellow);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .header-content {
            width: 100%;
            max-width: 800px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 1rem;
        }
        .header h2 {
            margin: 0;
            color: var(--white);
            font-weight: 800;
            font-size: 1.5rem;
            letter-spacing: -0.5px;
        }
        .header h2 span { color: var(--yellow); }
        .badge {
            background: rgba(252, 194, 6, 0.1);
            border: 1px solid rgba(252, 194, 6, 0.3);
            color: var(--yellow);
            padding: 0.5rem 1.2rem;
            border-radius: 50px;
            font-size: 0.9rem;
            font-weight: 600;
            box-shadow: 0 0 15px rgba(252, 194, 6, 0.1);
        }

        /* Alert */
        .alert {
            display: none;
            background: rgba(220, 53, 69, 0.1);
            border: 1px solid rgba(220, 53, 69, 0.5);
            color: #ff6b6b;
            padding: 1.5rem;
            border-radius: 12px;
            margin-bottom: 2rem;
            backdrop-filter: blur(10px);
            animation: slideDown 0.5s ease-out forwards;
        }
        @keyframes slideDown {
            from { transform: translateY(-20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        /* Questions */
        .question-card { 
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: 16px; 
            padding: 2.5rem;
            margin-bottom: 2rem;
            opacity: 0;
            transform: translateY(30px);
            animation: fadeInUp 0.6s ease-out forwards;
        }
        
        /* Staggered animation classes injected by JS below */

        @keyframes fadeInUp {
            to { opacity: 1; transform: translateY(0); }
        }

        .question-card h5 {
            margin-top: 0;
            margin-bottom: 2rem;
            font-size: 1.25rem;
            font-weight: 600;
            line-height: 1.6;
            color: var(--white);
        }

        /* Custom Options */
        .options-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 1rem;
        }
        @media (min-width: 600px) {
            .options-grid { grid-template-columns: 1fr 1fr; }
        }

        .option-label {
            position: relative;
            display: flex;
            align-items: center;
            padding: 1.2rem;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            font-weight: 500;
            color: rgba(255,255,255,0.8);
        }
        .option-label:hover {
            background: rgba(252, 194, 6, 0.05);
            border-color: rgba(252, 194, 6, 0.3);
            transform: translateY(-2px);
        }
        
        /* Hidden actual radio input */
        .option-label input[type="radio"] {
            position: absolute;
            opacity: 0;
            cursor: pointer;
        }

        /* Active State */
        .option-label input[type="radio"]:checked + .option-text {
            color: var(--yellow);
            font-weight: 700;
        }
        .option-label:has(input[type="radio"]:checked) {
            background: rgba(252, 194, 6, 0.1);
            border-color: var(--yellow);
            box-shadow: 0 5px 15px rgba(252, 194, 6, 0.2), inset 0 0 10px rgba(252, 194, 6, 0.05);
        }

        /* Submit Button */
        .btn-success {
            width: 100%;
            padding: 1.2rem;
            border: none;
            border-radius: 50px;
            background: linear-gradient(135deg, #fcc206 0%, #ffdd44 100%);
            color: var(--black);
            font-weight: 800;
            font-size: 1.2rem;
            cursor: pointer;
            transition: all 0.4s;
            box-shadow: 0 10px 30px rgba(252, 194, 6, 0.3);
            margin-top: 1rem;
            letter-spacing: 0.5px;
        }
        .btn-success:hover {
            transform: translateY(-4px) scale(1.02);
            box-shadow: 0 15px 40px rgba(252, 194, 6, 0.5);
        }
    </style>
</head>
<body>
    <div class="bg-animation"></div>
    
    <div class="header">
        <div class="header-content">
            <h2>DoxPro <span>Portal</span></h2>
            <span class="badge">{{ student_name }}</span>
        </div>
    </div>

    <div class="container">
        <div id="warning-alert" class="alert">
            <strong>Security Warning!</strong> Tab switching detected. Your exam will be automatically submitted if you do this more than 2 times.
            <span id="warning-count-display"></span>
        </div>

        <form id="examForm" action="/submit" method="POST">
            {% for q in questions %}
            <div class="question-card" style="animation-delay: {{ loop.index * 0.1 }}s">
                <h5>{{ loop.index }}. {{ q.question }}</h5>
                <div class="options-grid">
                    {% for opt in q.options %}
                    <label class="option-label">
                        <input type="radio" name="question_{{ q.id }}" value="{{ opt }}" required>
                        <span class="option-text">{{ opt }}</span>
                    </label>
                    {% endfor %}
                </div>
            </div>
            {% endfor %}
            
            <button id="submitBtn" class="btn-success" type="submit">FINISH EXAM</button>
        </form>
    </div>

    <script>
        let warnings = 0;
        const maxWarnings = 2;
        let isSubmitting = false;

        document.getElementById('examForm').addEventListener('submit', function() {
            isSubmitting = true;
        });

        document.addEventListener("visibilitychange", function() {
            if (document.hidden && !isSubmitting) {
                warnings++;
                
                fetch('/record_warning', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' }
                });

                if (warnings > maxWarnings) {
                    isSubmitting = true;
                    alert("Security violation limit reached. Exam is being submitted automatically.");
                    document.getElementById('examForm').submit();
                } else {
                    document.getElementById('warning-alert').style.display = 'block';
                    document.getElementById('warning-count-display').innerText = `(Violation ${warnings} of ${maxWarnings})`;
                    alert(`Security Warning! Do not switch tabs. (${maxWarnings - warnings + 1} warnings left)`);
                }
            }
        });
    </script>
</body>
</html>
